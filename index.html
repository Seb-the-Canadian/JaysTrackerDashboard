<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  color-scheme: dark;
  --primary-color: #134A8E;
  --accent-color: #1d8acd;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #0a0e14;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
.app { max-width: 1280px; margin: 0 auto; padding: 24px; }
.header { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid #1f2937; padding-bottom: 16px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark { width: 32px; height: 32px; background: var(--primary-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 16px; }
.brand-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.brand-sub { font-size: 12px; color: #8b96a8; margin-top: 2px; }
.as-of { font-size: 12px; color: #8b96a8; text-align: right; }
.refreshed { font-size: 11px; color: #6b7689; margin-top: 2px; text-align: right; }
.refreshed.staleness-amber { color: #d29922; font-weight: 600; }
.refreshed.staleness-red { color: #f85149; font-weight: 700; }
.nav { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #1f2937; overflow-x: auto; }
.nav-btn { background: transparent; border: none; color: #8b96a8; padding: 10px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
.nav-btn:hover { color: #e6edf3; }
.nav-btn.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }
.nav-btn svg { width: 16px; height: 16px; }
.panel { display: none; }
.panel.active { display: block; }
.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #8b96a8; font-weight: 600; margin: 0 0 12px 0; }
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
.card { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; }
.card.highlight { border-color: var(--primary-color); }
.stat-big { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #8b96a8; margin-bottom: 4px; }
.stat-sub { font-size: 12px; color: #8b96a8; margin-top: 4px; }
.pos { color: #3fb950; }
.neg { color: #f85149; }
.warn { color: #d29922; }
.dim { color: #8b96a8; }
.accent { color: var(--accent-color); }
.tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; border-radius: 10px; background: #1f2937; color: #8b96a8; font-weight: 600; }
.tag.injury { background: rgba(248,81,73,0.12); color: #f85149; }
.rank-pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: rgba(29,138,205,0.12); color: var(--accent-color); margin-left: 8px; font-variant-numeric: tabular-nums; }
.rank-pill.dim { background: #1f2937; color: #8b96a8; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #1f2937; }
th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #8b96a8; font-weight: 600; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
th.num { text-align: right; }
tr.jays { background: rgba(19,74,142,0.18); }
tr.jays td:first-child { font-weight: 700; }
.stat-chip { display: inline-block; position: relative; border-bottom: 1px dotted #4b5563; cursor: help; }
.stat-chip:hover { border-bottom-color: var(--accent-color); }
.tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #0d141f; border: 1px solid #2a3548; border-radius: 6px; padding: 12px; width: 280px; font-size: 12px; line-height: 1.5; color: #c9d1d9; z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: left; font-weight: normal; letter-spacing: normal; text-transform: none; }
.tooltip.open { display: block; }
.tooltip-stat { display: block; font-size: 13px; font-weight: 700; color: var(--accent-color); margin-bottom: 6px; }
.tooltip-section { display: block; color: #8b96a8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin: 8px 0 2px 0; }
.tooltip-body { display: block; }
.player-card { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.15s; }
.player-card:hover { border-color: var(--accent-color); transform: translateY(-1px); }
.player-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.player-name { font-weight: 600; font-size: 14px; }
.player-pos { font-size: 11px; color: #8b96a8; }
.player-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
.mini-stat { font-size: 12px; }
.mini-stat-label { color: #8b96a8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.mini-stat-val { font-weight: 600; font-variant-numeric: tabular-nums; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: flex-start; justify-content: center; z-index: 1000; padding: 32px 16px; overflow-y: auto; }
.modal-backdrop.open { display: flex; }
.modal { background: #131923; border: 1px solid #2a3548; border-radius: 12px; width: 100%; max-width: 640px; padding: 24px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: #8b96a8; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
.modal-close:hover { color: #e6edf3; }
.modal-head { margin-bottom: 16px; padding-right: 32px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-sub { font-size: 12px; color: #8b96a8; margin-top: 4px; }
.stat-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid #1f2937; gap: 4px 12px; }
.stat-row:last-child { border-bottom: none; }
.stat-row-label { font-size: 13px; color: #c9d1d9; flex: 1; }
.stat-row-val { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
.stat-row-context { flex-basis: 100%; font-size: 12px; line-height: 1.5; color: #8b96a8; padding-left: 0; margin-top: 2px; }
.recent-note { font-size: 12px; line-height: 1.5; color: #c9d1d9; margin-top: 10px; padding-top: 8px; border-top: 1px solid #1f2937; }
.read { background: #0d141f; border: 1px solid #1f2937; border-left: 3px solid var(--accent-color); border-radius: 6px; padding: 12px 14px; margin: 14px 0; font-size: 13px; line-height: 1.6; color: #c9d1d9; }
.read-label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-color); font-weight: 700; margin-bottom: 6px; }
.ask-box { margin-top: 16px; border-top: 1px solid #1f2937; padding-top: 16px; }
.ask-suggestions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.ask-chip { font-size: 11px; padding: 4px 10px; background: #1f2937; color: #8b96a8; border-radius: 12px; cursor: pointer; border: none; font-family: inherit; }
.ask-chip:hover { background: #2a3548; color: #e6edf3; }
.game { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.game:hover { border-color: #2a3548; }
.game-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.game-result { display: flex; align-items: center; gap: 12px; }
.result-pill { font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 4px; font-variant-numeric: tabular-nums; }
.result-pill.W { background: rgba(63,185,80,0.15); color: #3fb950; }
.result-pill.L { background: rgba(248,81,73,0.15); color: #f85149; }
.game-date { font-size: 12px; color: #8b96a8; min-width: 80px; }
.game-vs { font-size: 13px; }
.game-moment { font-size: 12px; color: #c9d1d9; flex: 1; min-width: 200px; }
.game-meaning { margin-top: 10px; padding-top: 10px; border-top: 1px solid #1f2937; font-size: 13px; line-height: 1.6; color: #c9d1d9; display: none; }
.game.expanded .game-meaning { display: block; }
.injury-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.injury-card { padding: 10px 12px; background: rgba(248,81,73,0.06); border: 1px solid rgba(248,81,73,0.25); border-radius: 6px; font-size: 13px; }
.injury-name { font-weight: 600; }
.injury-status { font-size: 11px; color: #f85149; margin-top: 2px; }
.injury-eta { font-size: 11px; color: #8b96a8; margin-top: 2px; }
.legend-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #1f2937; gap: 8px; }
.legend-row:last-child { border-bottom: none; }
.chart-wrap { position: relative; height: 220px; }
.note { font-size: 12px; color: #d29922; background: rgba(210,153,34,0.06); border: 1px solid rgba(210,153,34,0.25); border-radius: 6px; padding: 10px 12px; margin: 12px 0; }
.note code { font-family: 'SF Mono', Menlo, Consolas, monospace; background: #0d141f; padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #e6edf3; }
.since-yesterday { background: #131923; border: 1px solid #1f2937; border-left: 3px solid var(--accent-color); border-radius: 6px; padding: 14px 16px; }
.since-yesterday .row { display: grid; grid-template-columns: 140px 1fr; gap: 14px; padding: 8px 0; border-bottom: 1px solid #1f2937; }
.since-yesterday .row:last-child { border-bottom: none; }
.since-yesterday .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-color); font-weight: 700; padding-top: 2px; }
.since-yesterday .body { font-size: 13px; line-height: 1.5; color: #c9d1d9; }
@media (max-width: 600px) { .since-yesterday .row { grid-template-columns: 1fr; gap: 4px; } }
.schema-banner { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.4); color: #f85149; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #131923; border: 1px solid var(--accent-color); color: #e6edf3; padding: 10px 18px; border-radius: 8px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 2000; }
.toast.shown { opacity: 1; }
.loading { padding: 40px; text-align: center; color: #8b96a8; }
.fatal-error { padding: 20px; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.4); color: #f85149; border-radius: 8px; margin: 20px 0; }
h2 { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; letter-spacing: -0.01em; }
h3 { font-size: 14px; font-weight: 600; margin: 0 0 10px 0; color: #c9d1d9; }
.section { margin-bottom: 28px; }
.school-toc { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.toc-chip { font-size: 11px; padding: 4px 10px; background: #1f2937; color: #c9d1d9; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.toc-chip:hover { background: var(--primary-color); color: white; }
.stat-entry { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.stat-entry-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.stat-entry-term { font-size: 18px; font-weight: 700; color: var(--accent-color); letter-spacing: -0.01em; }
.stat-entry-name { font-size: 13px; color: #8b96a8; }
.stat-entry-row { margin-top: 10px; font-size: 13px; line-height: 1.6; color: #c9d1d9; }
.stat-entry-row .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-color); font-weight: 700; display: block; margin-bottom: 2px; }
.stat-entry-row.calc .label { color: #d29922; }
.stat-entry-row.bench .label { color: #3fb950; }
.stat-entry-row.pitfall .label { color: #f85149; }
.stat-entry-row .body { color: #c9d1d9; }
.stat-entry-row .body code, .stat-entry-row .body em { font-family: 'SF Mono', Menlo, Consolas, monospace; font-style: normal; background: #0d141f; padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #e6edf3; }
.theme-block { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 18px; margin-bottom: 12px; }
.theme-block-title { font-size: 15px; font-weight: 700; color: #e6edf3; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #1f2937; letter-spacing: -0.01em; }
.tip { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed #1f2937; }
.tip:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.tip-headline { font-size: 13px; font-weight: 700; color: var(--accent-color); margin-bottom: 6px; letter-spacing: -0.005em; }
.tip-body { font-size: 13px; line-height: 1.6; color: #c9d1d9; }
.school-intro { font-size: 13px; line-height: 1.6; color: #c9d1d9; background: #131923; border: 1px solid #1f2937; border-left: 3px solid var(--accent-color); border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; }
.school-tab-switch { display: flex; gap: 4px; margin-bottom: 20px; padding: 3px; background: #131923; border: 1px solid #1f2937; border-radius: 8px; width: fit-content; }
.school-tab-switch button { background: transparent; border: none; color: #8b96a8; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; }
.school-tab-switch button:hover { color: #e6edf3; }
.school-tab-switch button.active { background: var(--primary-color); color: white; }
.school-content { display: none; }
.school-content.active { display: block; }
.pitch-category { margin-bottom: 24px; }
.pitch-category-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-color); font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--primary-color); }
.pitch-card { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
.pitch-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.pitch-name { font-size: 15px; font-weight: 700; color: #e6edf3; letter-spacing: -0.005em; }
.pitch-abbr { font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace; color: var(--accent-color); background: rgba(29,138,205,0.1); padding: 2px 6px; border-radius: 3px; }
.pitch-velo { font-size: 12px; color: #d29922; font-variant-numeric: tabular-nums; }
.pitch-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #1f2937; line-height: 1.55; }
.pitch-row:last-child { border-bottom: none; }
.pitch-row .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #8b96a8; font-weight: 600; padding-top: 2px; }
.pitch-row .body { color: #c9d1d9; }
@media (max-width: 600px) { .pitch-row { grid-template-columns: 1fr; gap: 2px; } }
.position-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 18px; }
.position-card { background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
.position-num { width: 36px; height: 36px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.position-body { flex: 1; }
.position-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.position-name { font-weight: 700; font-size: 14px; color: #e6edf3; }
.position-abbr { font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace; color: #8b96a8; }
.position-note { font-size: 12px; line-height: 1.5; color: #c9d1d9; }
.score-codes { display: grid; grid-template-columns: 140px 1fr; gap: 8px 16px; font-size: 13px; background: #131923; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; }
.score-codes .code { font-family: 'SF Mono', Menlo, Consolas, monospace; color: var(--accent-color); font-weight: 600; padding: 4px 0; border-bottom: 1px solid #1f2937; }
.score-codes .meaning { color: #c9d1d9; padding: 4px 0; border-bottom: 1px solid #1f2937; line-height: 1.5; }
.score-codes .code:last-of-type, .score-codes .meaning:last-of-type { border-bottom: none; }
@media (max-width: 600px) { .score-codes { grid-template-columns: 1fr; } .score-codes .meaning { padding-bottom: 12px; } }
.diamond-wrap { display: flex; justify-content: center; margin: 16px 0; }
.diamond { position: relative; width: 320px; height: 320px; }
.diamond-shape { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; transform: translate(-50%, -50%) rotate(45deg); border: 2px solid var(--primary-color); background: rgba(19,74,142,0.08); }
.outfield-arc { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 320px; height: 320px; border-radius: 50%; border: 1px dashed #2a3548; border-bottom: none; border-left: none; border-right: none; }
.diamond-pos { position: absolute; width: 32px; height: 32px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; transform: translate(-50%, -50%); border: 2px solid #0a0e14; cursor: default; }
.diamond-pos.outfield { background: var(--accent-color); }
.diamond-pos.battery { background: #d29922; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="brand-mark" id="brandMark">·</div>
      <div>
        <div class="brand-title" id="brandTitle">Loading…</div>
        <div class="brand-sub">Season state, players, stats &mdash; with the context</div>
      </div>
    </div>
    <div>
      <div class="as-of" id="asOf"></div>
      <div class="refreshed" id="refreshed"></div>
    </div>
  </header>
  <div id="schemaBanner" class="schema-banner" style="display:none"></div>
  <nav class="nav" id="nav"></nav>
  <main>
    <section class="panel active" id="panel-overview"><div class="loading">Loading data…</div></section>
    <section class="panel" id="panel-players"></section>
    <section class="panel" id="panel-team"></section>
    <section class="panel" id="panel-games"></section>
    <section class="panel" id="panel-school"></section>
  </main>
</div>
<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// ─── State ──────────────────────────────────────────────────────────
let DATA = null;
let NOTES = {};
let CONFIG = null;
let _chartDrawn = false;

const EXPECTED_KEYS = ['as_of','team','division','wild_card','recent_games','upcoming_games','roster','injuries','transactions','run_diff_last_10'];

// Top-N hitters by AB go in "Lineup Regulars"; the rest fall to "Bench / Depth".
const LINEUP_REGULAR_COUNT = 8;

// ─── Static reference (doesn't change with team data) ───────────────────────
const STAT_DEFS = {
  'wRC+':     { name: 'Weighted Runs Created Plus', measures: 'Park- and league-adjusted total offensive value.', bench: '100 = average. 110+ above. 120+ All-Star caliber. 90 below.' },
  'OPS+':     { name: 'On-base Plus Slugging Plus', measures: 'Park-adjusted OPS scaled so 100 is league average.', bench: 'Same scale as wRC+. Older convention; wRC+ preferred today.' },
  'OPS':      { name: 'On-Base Plus Slugging', measures: 'OBP + SLG. Quick offensive snapshot, not park-adjusted.', bench: '.900+ great, .800+ above avg, .700 avg, .600 weak.' },
  'xwOBA':    { name: 'Expected wOBA', measures: 'What a hitter "should" produce based on contact quality plus walks and Ks.', bench: '.370+ great, .340+ above avg, .320 avg, .300 weak.' },
  'Barrel%':  { name: 'Barrel Rate', measures: 'Percent of batted balls hit at optimal EV + LA.', bench: '12%+ elite, 8-10% above avg, 6% avg.' },
  'Hard Hit%':{ name: 'Hard Hit Rate', measures: 'Percent of batted balls 95+ MPH off the bat.', bench: '50%+ elite, 40%+ above avg, 35% avg.' },

// ─── Loading ───────────────────────────────────────────────────────────
async function loadAll() {
  let config;
  try {
    const r = await fetch('./config.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    config = await r.json();
  } catch (e) {
    fatal('Failed to load config.json: ' + e.message + '. The dashboard cannot start without team configuration.');
    return;
  }
  CONFIG = config;
  applyConfig(config);

  // Try cache for instant render on same-day reopen.
  try {
    const today = new Date().toISOString().slice(0, 10);
    const cached = JSON.parse(localStorage.getItem('jaysTracker.data') || 'null');
    if (cached && typeof cached.as_of === 'string' && cached.as_of.slice(0, 10) === today) {
      DATA = cached;
      NOTES = JSON.parse(localStorage.getItem('jaysTracker.notes') || '{}');
      applyStaleness(DATA.as_of);
      renderAll();
    }
  } catch (_) {}

  // Always fetch fresh and overwrite cache.
  let data, notes;
  try {
    const [dResp, nResp] = await Promise.all([
      fetch('./data.json', { cache: 'no-store' }),
      fetch('./notes.json', { cache: 'no-store' })
    ]);
    if (!dResp.ok) throw new Error('data.json HTTP ' + dResp.status);
    data = await dResp.json();
    notes = nResp.ok ? await nResp.json() : {};
  } catch (e) {
    if (!DATA) {
      fatal('Failed to load data.json: ' + e.message + '. The fetcher may not have run yet.');
    } else {
      console.warn('Background refresh failed:', e);
    }
    return;
  }

  validateSchema(data);
  DATA = data;
  NOTES = notes || {};
  try {
    localStorage.setItem('jaysTracker.data', JSON.stringify(data));
    localStorage.setItem('jaysTracker.notes', JSON.stringify(notes || {}));
  } catch (_) {}
  applyStaleness(data.as_of);
  renderAll();
}

function fatal(msg) {
  console.error(msg);
  document.querySelector('main').innerHTML = '<div class="fatal-error">' + msg + '</div>';
}

function applyConfig(cfg) {
  const title = cfg.dashboard_title || 'MLB Tracker';
  document.title = title;
  document.getElementById('brandTitle').textContent = title;
  document.getElementById('brandMark').textContent = cfg.brand_mark || '·';
  if (cfg.primary_color) document.documentElement.style.setProperty('--primary-color', cfg.primary_color);
  if (cfg.accent_color)  document.documentElement.style.setProperty('--accent-color',  cfg.accent_color);
}

function applyStaleness(asOf) {
  const refreshed = document.getElementById('refreshed');
  const asOfEl = document.getElementById('asOf');
  if (!asOf) { refreshed.textContent = ''; asOfEl.textContent = ''; return; }
  const fetched = new Date(asOf);
  if (isNaN(fetched.getTime())) { refreshed.textContent = 'Last refreshed: unknown'; asOfEl.textContent = ''; return; }
  const ageHours = (Date.now() - fetched.getTime()) / 3600000;
  let cls = 'refreshed';
  if (ageHours > 72) cls += ' staleness-red';
  else if (ageHours > 36) cls += ' staleness-amber';
  refreshed.className = cls;
  refreshed.textContent = 'Last refreshed: ' + fetched.toLocaleString();
  asOfEl.textContent = 'As of ' + fetched.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function validateSchema(data) {
  const missing = EXPECTED_KEYS.filter(k => !(k in data));
  if (missing.length) {
    console.warn('data.json schema drift — missing top-level keys:', missing);
    const banner = document.getElementById('schemaBanner');
    banner.textContent = 'Data schema warning: missing fields — ' + missing.join(', ') + '. Dashboard may render incompletely.';
    banner.style.display = 'block';
  }
}

// ─── Toast / clipboard ──────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('shown');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('shown'), 2500);
}

async function copyAskPrompt(prompt) {
  try {
    await navigator.clipboard.writeText(prompt);
    showToast('Copied. Paste into Claude or your AI of choice.');
  } catch (_) {
    showToast('Could not copy — clipboard unavailable.');
  }
}

// ─── statChip ───────────────────────────────────────────────────────────────
function statChip(stat, displayValue) {
  const def = STAT_DEFS[stat];
  if (!def) return displayValue || stat;
  const id = 'sc_' + Math.random().toString(36).slice(2, 9);
  return '<span class="stat-chip" onclick="toggleTip(\'' + id + '\')">' + (displayValue || stat) +
    '<span class="tooltip" id="' + id + '"><span class="tooltip-stat">' + stat + ' — ' + def.name + '</span>' +
    '<span class="tooltip-section">What it measures</span><span class="tooltip-body">' + def.measures + '</span>' +
    '<span class="tooltip-section">Benchmarks</span><span class="tooltip-body">' + def.bench + '</span></span></span>';
}

function toggleTip(id) {
  document.querySelectorAll('.tooltip.open').forEach(t => { if (t.id !== id) t.classList.remove('open'); });
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
  event.stopPropagation();
}

document.body.addEventListener('click', () => {
  document.querySelectorAll('.tooltip.open').forEach(t => t.classList.remove('open'));
});

// ─── Nav and tabs ──────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t =>
    '<button class="nav-btn ' + (t.id === 'overview' ? 'active' : '') + '" data-tab="' + t.id + '">' + ICONS[t.icon] + '<span>' + t.label + '</span></button>'
  ).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tabId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
  if (tabId === 'overview' && !_chartDrawn) drawDiffChart();
}

function renderAll() {
  renderNav();
  renderOverview();
  renderPlayers();
  renderTeam();
  renderGames();
  renderSchool();
  // chart needs the canvas to be in the DOM before drawing
  setTimeout(drawDiffChart, 50);
}

// ─── Overview ───────────────────────────────────────────────────────────────
function renderOverview() {
  if (!DATA) return;
  const t = DATA.team || {};
  const rec = t.record || {};
  const w = rec.w ?? 0, l = rec.l ?? 0;
  const pw = t.pythag_w ?? 0, pl = t.pythag_l ?? 0;
  const pythDelta = w - pw;
  const pythStr = pythDelta === 0 ? 'matching Pythagorean'
    : pythDelta > 0 ? pythDelta + ' W ahead of Pythag' : Math.abs(pythDelta) + ' W below Pythag';

  const html =
    '<div class="section"><div class="grid grid-4">' +
      '<div class="card highlight">' +
        '<div class="stat-label">Record</div>' +
        '<div class="stat-big">' + w + '-' + l + '</div>' +
        '<div class="stat-sub">' + (t.place || '') + '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="stat-label">Last 10</div>' +
        '<div class="stat-big">' + (t.last10 || '—') + '</div>' +
        '<div class="stat-sub">Streak: <span class="' + ((t.streak || '').startsWith('W') ? 'pos' : 'neg') + '">' + (t.streak || '—') + '</span></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="stat-label">Run Differential</div>' +
        '<div class="stat-big ' + ((t.run_diff ?? 0) >= 0 ? 'pos' : 'neg') + '">' + (t.run_diff ?? 0) + '</div>' +
        '<div class="stat-sub">' + (t.runs_scored ?? 0) + ' RS / ' + (t.runs_allowed ?? 0) + ' RA</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="stat-label">' + statChip('Pythagorean') + '</div>' +
        '<div class="stat-big">' + pw + '-' + pl + '</div>' +
        '<div class="stat-sub">' + pythStr + '</div>' +
      '</div>' +
    '</div></div>' +
    '<div class="section">' + renderSinceYesterday() + '</div>' +
    '<div class="section grid grid-2">' +
      '<div class="card"><h2>Division</h2>' + renderStandingsTable(DATA.division || [], true) + '</div>' +
      '<div class="card"><h2>Wild Card</h2>' + renderWildCardTable(DATA.wild_card || []) + '</div>' +
    '</div>' +
    '<div class="section grid grid-2">' +
      '<div class="card"><h2>Run Differential by Game (recent)</h2><div class="chart-wrap"><canvas id="diffChart"></canvas></div></div>' +
      '<div class="card"><h2>Upcoming</h2>' + renderUpcomingTable(DATA.upcoming_games || []) + '</div>' +
    '</div>';

  document.getElementById('panel-overview').innerHTML = html;
  _chartDrawn = false;
}

function renderStandingsTable(rows, withLast10) {
  const head = '<thead><tr><th>Team</th><th class="num">W</th><th class="num">L</th><th class="num">PCT</th><th class="num">GB</th>' +
    (withLast10 ? '<th class="num">L10</th><th class="num">STRK</th>' : '') + '</tr></thead>';
  const body = rows.map(r =>
    '<tr class="' + (r.is_us ? 'jays' : '') + '">' +
      '<td>' + escapeText(r.team) + '</td>' +
      '<td class="num">' + r.w + '</td>' +
      '<td class="num">' + r.l + '</td>' +
      '<td class="num">' + (r.pct || '') + '</td>' +
      '<td class="num">' + (r.gb || '-') + '</td>' +
      (withLast10
        ? '<td class="num">' + (r.last10 || '') + '</td>' +
          '<td class="num"><span class="' + ((r.streak || '').startsWith('W') ? 'pos' : 'neg') + '">' + (r.streak || '') + '</span></td>'
        : '') +
    '</tr>'
  ).join('');
  return '<table>' + head + '<tbody>' + body + '</tbody></table>';
}

function renderWildCardTable(rows) {
  const head = '<thead><tr><th>Team</th><th class="num">W</th><th class="num">L</th><th class="num">GB</th><th>Status</th></tr></thead>';
  const body = rows.map(r => {
    const note = r.note || '';
    const cls = (note.startsWith('In') || note.startsWith('Division')) ? 'pos' : (note === 'Out' ? 'dim' : '');
    return '<tr class="' + (r.is_us ? 'jays' : '') + '">' +
      '<td>' + escapeText(r.team) + '</td>' +
      '<td class="num">' + r.w + '</td>' +
      '<td class="num">' + r.l + '</td>' +
      '<td class="num">' + (r.gb || '-') + '</td>' +
      '<td class="' + cls + '">' + escapeText(note) + '</td>' +
      '</tr>';
  }).join('');
  return '<table>' + head + '<tbody>' + body + '</tbody></table>' +
    '<div class="note">Wild-card status labels are heuristic (division leaders + top 3 chasers in the league); rivals’ records reflect what the API returned.</div>';
}

function renderUpcomingTable(rows) {
  if (!rows.length) return '<div class="dim">No upcoming games on the calendar.</div>';
  const head = '<thead><tr><th>Date</th><th>Opp</th><th>Probable SP</th></tr></thead>';
  const body = rows.map(g => {
    const opp = (g.home ? 'vs ' : '@ ') + escapeText(g.opp || '');
    const sps = [g.probable_pitcher_us, g.probable_pitcher_them].filter(Boolean).join(' vs ');
    return '<tr><td class="dim">' + escapeText(g.date) + '</td><td>' + opp + '</td><td>' + (escapeText(sps) || '—') + '</td></tr>';
  }).join('');
  return '<table>' + head + '<tbody>' + body + '</tbody></table>';
}

function renderSinceYesterday() {
  const games = DATA.recent_games || [];
  const lastGame = games.slice().reverse().find(g => g.result);
  const lastStr = lastGame
    ? lastGame.date + ': ' + lastGame.result + ' ' + lastGame.score + ' ' + (lastGame.home ? 'vs' : '@') + ' ' + escapeText(lastGame.opp) +
      (lastGame.summary_facts ? ' — ' + escapeText(lastGame.summary_facts) : '')
    : 'No recent completed game.';

  const upcoming = (DATA.upcoming_games || [])[0];
  const nextStr = upcoming
    ? upcoming.date + ' ' + (upcoming.home ? 'vs' : '@') + ' ' + escapeText(upcoming.opp) + ' — ' +
      (upcoming.probable_pitcher_us || 'TBD') + ' vs ' + (upcoming.probable_pitcher_them || 'TBD')
    : 'No upcoming game scheduled.';

  const txs = (DATA.transactions || []).slice(0, 3);
  const txStr = txs.length
    ? txs.map(t => '<div>' + escapeText(t.date) + ': ' + escapeText(t.description || t.type || '') + '</div>').join('')
    : '<div class="dim">No transactions in the last week.</div>';

  return '<div class="since-yesterday">' +
    '<div class="row"><div class="label">Last game</div><div class="body">' + lastStr + '</div></div>' +
    '<div class="row"><div class="label">Next up</div><div class="body">' + nextStr + '</div></div>' +
    '<div class="row"><div class="label">Recent transactions</div><div class="body">' + txStr + '</div></div>' +
    '</div>';
}

function drawDiffChart() {
  if (_chartDrawn || !DATA) return;
  const ctx = document.getElementById('diffChart');
  if (!ctx) return;
  const data = DATA.run_diff_last_10 || [];
  if (!data.length) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: 'Run Diff',
        data: data.map(d => d.diff),
        backgroundColor: data.map(d => d.diff >= 0 ? 'rgba(63,185,80,0.7)' : 'rgba(248,81,73,0.7)'),
        borderColor: data.map(d => d.diff >= 0 ? '#3fb950' : '#f85149'),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#0d141f', borderColor: '#2a3548', borderWidth: 1,
          callbacks: { label: (item) => { const d = data[item.dataIndex]; return d.result + ' · run diff ' + (d.diff > 0 ? '+' : '') + d.diff; } } }
      },
      scales: {
        x: { ticks: { color: '#8b96a8' }, grid: { color: '#1f2937' } },
        y: { ticks: { color: '#8b96a8' }, grid: { color: '#1f2937' } }
      }
    }
  });
  _chartDrawn = true;
}

// ─── Players ────────────────────────────────────────────────────────────────
function renderPlayers() {
  const roster = (DATA.roster) || { hitters: [], pitchers: [] };

  // Hitters: sort by AB desc, top N are regulars, the rest are bench/depth.
  const hittersByAb = (roster.hitters || []).slice().sort((a, b) => (b.ab ?? 0) - (a.ab ?? 0));
  const lineupRegulars = hittersByAb.slice(0, LINEUP_REGULAR_COUNT);
  const benchDepth = hittersByAb.slice(LINEUP_REGULAR_COUNT);

  // Pitchers: gs >= 3 are the rotation, the rest are bullpen.
  // Missing gs counts as 0, which keeps spot starters / openers in the bullpen.
  const rotation = (roster.pitchers || []).filter(p => (p.gs ?? 0) >= 3);
  const bullpen = (roster.pitchers || []).filter(p => (p.gs ?? 0) < 3);

  const playerSection = (heading, players, kind) => {
    if (!players.length) return '';
    const cards = players.map(p => playerCardHTML(p, kind)).join('');
    return '<div class="section"><h2>' + heading + '</h2><div class="grid grid-3">' + cards + '</div></div>';
  };

  const injuries = (DATA.injuries || []).map(i =>
    '<div class="injury-card"><div class="injury-name">' + escapeText(i.name) + '</div>' +
    '<div class="injury-status">' + escapeText(i.status || '') + '</div>' +
    (i.eta_note ? '<div class="injury-eta">' + escapeText(i.eta_note) + '</div>' : '') + '</div>'
  ).join('') || '<div class="dim">No injuries reported.</div>';

  document.getElementById('panel-players').innerHTML =
    playerSection('Lineup Regulars', lineupRegulars, 'hitter') +
    playerSection('Starting Rotation', rotation, 'pitcher') +
    playerSection('Bullpen', bullpen, 'pitcher') +
    playerSection('Bench / Depth', benchDepth, 'hitter') +
    '<div class="section"><h2>Injured List</h2><div class="injury-list">' + injuries + '</div></div>';

  document.querySelectorAll('.player-card[data-pid]').forEach(card => {
    card.addEventListener('click', () => openPlayer(card.dataset.pid, card.dataset.kind));
  });
}

function playerCardHTML(p, kind) {
  const playerNote = (NOTES.players && NOTES.players[String(p.id)]) || null;
  const recentNote = playerNote && playerNote.recentNote
    ? '<div class="recent-note">' + playerNote.recentNote + '</div>'
    : '';
  if (kind === 'hitter') {
    return '<div class="player-card" data-pid="' + p.id + '" data-kind="hitter">' +
      '<div class="player-card-head"><div>' +
        '<div class="player-name">' + escapeText(p.name) + '</div>' +
        '<div class="player-pos">' + escapeText(p.pos || '') + '</div>' +
      '</div></div>' +
      '<div class="player-stats">' +
        '<div class="mini-stat"><div class="mini-stat-label">AVG / OPS</div><div class="mini-stat-val">' + (p.avg || '—') + ' / ' + (p.ops || '—') + '</div></div>' +
        '<div class="mini-stat"><div class="mini-stat-label">HR / RBI</div><div class="mini-stat-val">' + (p.hr ?? 0) + ' / ' + (p.rbi ?? 0) + '</div></div>' +
        '<div class="mini-stat"><div class="mini-stat-label">SB</div><div class="mini-stat-val">' + (p.sb ?? 0) + '</div></div>' +
      '</div>' +
      recentNote +
    '</div>';
  }
  return '<div class="player-card" data-pid="' + p.id + '" data-kind="pitcher">' +
    '<div class="player-card-head"><div>' +
      '<div class="player-name">' + escapeText(p.name) + '</div>' +
      '<div class="player-pos">' + escapeText(p.role || '') + '</div>' +
    '</div></div>' +
    '<div class="player-stats">' +
      '<div class="mini-stat"><div class="mini-stat-label">ERA / WHIP</div><div class="mini-stat-val">' + (p.era || '—') + ' / ' + (p.whip || '—') + '</div></div>' +
      '<div class="mini-stat"><div class="mini-stat-label">IP</div><div class="mini-stat-val">' + (p.ip || '0.0') + '</div></div>' +
      '<div class="mini-stat"><div class="mini-stat-label">W-L-SV</div><div class="mini-stat-val">' + (p.w ?? 0) + '-' + (p.l ?? 0) + '-' + (p.sv ?? 0) + '</div></div>' +
    '</div>' +
    recentNote +
  '</div>';
}

function openPlayer(id, kind) {
  const roster = DATA.roster || { hitters: [], pitchers: [] };
  const list = kind === 'pitcher' ? roster.pitchers : roster.hitters;
  const p = list.find(x => String(x.id) === String(id));
  if (!p) return;

  const playerNote = (NOTES.players && NOTES.players[String(p.id)]) || null;
  const contextNotes = (playerNote && playerNote.contextNotes) || {};

  const fields = Object.entries(p).filter(([k]) => k !== 'id' && k !== 'name');
  const rows = fields.map(([label, val]) => {
    const ctx = Object.prototype.hasOwnProperty.call(contextNotes, label)
      ? '<div class="stat-row-context">' + contextNotes[label] + '</div>'
      : '';
    return '<div class="stat-row"><div class="stat-row-label">' + escapeText(label) + '</div>' +
      '<div class="stat-row-val">' + escapeText(String(val)) + '</div>' +
      ctx +
      '</div>';
  }).join('');

  const readBlock = playerNote && playerNote.read
    ? '<div class="read"><span class="read-label">The read</span>' + playerNote.read + '</div>'
    : '';

  const askPrompt = 'You are a sharp baseball analyst writing a brief on ' + p.name + ' (' + (kind === 'pitcher' ? p.role : p.pos) + ').\n\n' +
    '2026 season line:\n' + JSON.stringify(p, null, 2) + '\n\n' +
    'Write a 2-4 sentence read in the voice of a smart friend who watches a lot of games: is the recent stretch real, what does the surface line miss, what’s the role-specific bar to clear. Be direct.';

  document.getElementById('modalBody').innerHTML =
    '<button class="modal-close" onclick="closeModal()">&times;</button>' +
    '<div class="modal-head">' +
      '<div class="modal-title">' + escapeText(p.name) + '</div>' +
      '<div class="modal-sub">' + escapeText(kind === 'pitcher' ? (p.role || '') : (p.pos || '')) + '</div>' +
    '</div>' +
    readBlock +
    '<div>' + rows + '</div>' +
    '<div class="ask-box">' +
      '<div class="section-title">Ask the analyst</div>' +
      '<div class="ask-suggestions">' +
        '<button class="ask-chip" id="askPlayerChip">Copy analysis prompt</button>' +
      '</div>' +
      '<div class="stat-sub" style="margin-top:8px">The dashboard is static — clicking copies a prompt to your clipboard for use in Claude or another AI.</div>' +
    '</div>';

  document.getElementById('askPlayerChip').addEventListener('click', () => copyAskPrompt(askPrompt));
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ─── Team panel ───────────────────────────────────────────────────────────────
// Label order is fixed so the grid keeps its expected reading order — the
// schema-banner check elsewhere catches a missing key, so we don't try to
// be clever about what's present.
const TEAM_STAT_LABELS = {
  hitting: [
    ['runs', 'Runs'],
    ['avg',  'AVG'],
    ['obp',  'OBP'],
    ['slg',  'SLG'],
    ['ops',  'OPS'],
    ['hr',   'HR'],
  ],
  pitching: [
    ['era',  'ERA'],
    ['whip', 'WHIP'],
    ['k9',   'K/9'],
    ['bb9',  'BB/9'],
  ],
};

function rankPill(rank) {
  if (rank === null || rank === undefined || rank === '') {
    return '<span class="rank-pill dim">Rank —</span>';
  }
  return '<span class="rank-pill">Rank ' + escapeText(String(rank)) + '</span>';
}

function teamStatRow(label, entry) {
  const val = entry && entry.val !== undefined && entry.val !== null && entry.val !== '' ? entry.val : '—';
  const rank = entry ? entry.rank : null;
  return '<div class="stat-row">' +
    '<div class="stat-row-label">' + escapeText(label) + '</div>' +
    '<div class="stat-row-val">' + escapeText(String(val)) + rankPill(rank) + '</div>' +
  '</div>';
}

function teamStatSection(title, group, groupKey) {
  const labels = TEAM_STAT_LABELS[groupKey] || [];
  const rows = labels.map(([key, label]) => teamStatRow(label, (group || {})[key])).join('');
  return '<div class="card">' +
    '<h3>' + escapeText(title) + '</h3>' +
    rows +
  '</div>';
}

function renderTeam() {
  const t = DATA.team || {};
  const rec = t.record || {};
  const ts = DATA.team_stats;
  const hasStats = ts && typeof ts === 'object' &&
    (Object.keys(ts.hitting || {}).length > 0 || Object.keys(ts.pitching || {}).length > 0);

  const summaryCard =
    '<div class="card">' +
      '<h2>Team summary</h2>' +
      legendRow('Record', (rec.w ?? '—') + '-' + (rec.l ?? '—'), t.place || '') +
      legendRow('Run differential', String(t.run_diff ?? 0), (t.runs_scored ?? 0) + ' RS / ' + (t.runs_allowed ?? 0) + ' RA') +
      legendRow(statChip('Pythagorean'), (t.pythag_w ?? 0) + '-' + (t.pythag_l ?? 0), '') +
      legendRow('Last 10', t.last10 || '—', t.streak || '') +
    '</div>';

  let body = summaryCard;
  if (hasStats) {
    body +=
      '<div class="section-title" style="margin-top:20px;">Team stats &amp; MLB ranks</div>' +
      '<div class="grid grid-2">' +
        teamStatSection('Hitting', ts.hitting || {}, 'hitting') +
        teamStatSection('Pitching', ts.pitching || {}, 'pitching') +
      '</div>';
  } else {
    body +=
      '<div class="note">Per-category team rankings and detailed splits are not yet pulled by <code>fetch_data.py</code>. The Phase 2 schema covers the team-level summary; deeper team stats are a future-phase extension.</div>';
  }

  document.getElementById('panel-team').innerHTML = '<div class="section">' + body + '</div>';
}

function legendRow(label, value, sub) {
  return '<div class="legend-row">' +
    '<div>' + label + '</div>' +
    '<div style="display:flex; gap:12px; align-items:baseline;">' +
      '<span style="font-weight:600; font-variant-numeric:tabular-nums;">' + value + '</span>' +
      (sub ? '<span class="dim" style="font-size:11px;">' + escapeText(sub) + '</span>' : '') +
    '</div>' +
  '</div>';
}

// ─── Games panel ─────────────────────────────────────────────────────────────
function renderGames() {
  const games = (DATA.recent_games || []).slice().reverse();
  if (!games.length) {
    document.getElementById('panel-games').innerHTML = '<div class="dim">No recent games.</div>';
    return;
  }
  const html = '<div class="section"><h2>Recent Games</h2>' +
    games.map((g, i) => {
      const note = (NOTES.games && NOTES.games[String(g.game_pk)]) || null;
      const moment = (note && note.moment) || g.summary_facts || '';
      const meaning = note && note.meaning ? '<strong>What it meant:</strong> ' + escapeText(note.meaning) : '<div class="dim">No analyst note for this game yet. Add one to <code>notes.json</code> keyed by <code>' + g.game_pk + '</code> with <code>moment</code> and <code>meaning</code>.</div>';
      return '<div class="game" id="game-' + i + '">' +
        '<div class="game-head">' +
          '<div class="game-result">' +
            '<div class="game-date">' + escapeText(g.date) + '</div>' +
            '<span class="result-pill ' + g.result + '">' + g.result + ' ' + g.score + '</span>' +
            '<div class="game-vs">' + (g.home ? 'vs' : '@') + ' ' + escapeText(g.opp) + '</div>' +
          '</div>' +
          '<div class="game-moment">' + escapeText(moment) + '</div>' +
        '</div>' +
        '<div class="game-meaning">' + meaning +
          '<div class="ask-box">' +
            '<div class="ask-suggestions"><button class="ask-chip" data-game-idx="' + i + '">Copy ask-prompt for this game</button></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('') +
    '<div class="note">Auto-generated summary uses pitcher decisions + final score from the boxscore. Replace with hand-written meaning by editing <code>notes.json</code>.</div>' +
  '</div>';
  document.getElementById('panel-games').innerHTML = html;

  document.querySelectorAll('#panel-games .game').forEach((el, i) => {
    el.addEventListener('click', (ev) => {
      if (ev.target.closest('.ask-box')) return;
      el.classList.toggle('expanded');
    });
  });
  document.querySelectorAll('#panel-games .ask-chip').forEach(btn => {
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const idx = parseInt(btn.dataset.gameIdx, 10);
      const g = games[idx];
      const prompt = 'You are a sharp baseball analyst.\n\n' +
        'Game: ' + g.date + ' ' + (g.home ? 'vs' : '@') + ' ' + g.opp + ', result ' + g.result + ' ' + g.score + '.\n' +
        'Box-derived summary: ' + (g.summary_facts || 'none') + '\n\n' +
        'Write a 2-3 sentence read in the voice of a smart friend who watches a lot of games — what did this game mean for the season arc? Confident but not preachy. If the data doesn’t support a confident answer, say so.';
      copyAskPrompt(prompt);
    });
  });
}

// ─── School panel ─────────────────────────────────────────────────────────────
function renderSchool() {
  const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

  const statsHTML =
    '<div class="school-intro">Every stat in this dashboard, expanded. <strong>Definition</strong> is what it tries to measure. <strong>Calculation</strong> is the actual math. <strong>Benchmarks</strong> tell you what a number means in context. <strong>Pitfalls</strong> are where the stat misleads.</div>' +
    '<div class="school-toc">' +
      GLOSSARY.map(g => '<button class="toc-chip" onclick="document.getElementById(\'stat-' + slug(g.term) + '\').scrollIntoView({behavior:\'smooth\', block:\'start\'})">' + g.term + '</button>').join('') +
    '</div>' +
    GLOSSARY.map(g =>
      '<div class="stat-entry" id="stat-' + slug(g.term) + '">' +
        '<div class="stat-entry-head"><span class="stat-entry-term">' + g.term + '</span><span class="stat-entry-name">' + g.name + '</span></div>' +
        '<div class="stat-entry-row"><span class="label">Definition</span><span class="body">' + g.def + '</span></div>' +
        (g.calc ? '<div class="stat-entry-row calc"><span class="label">Calculation</span><span class="body">' + g.calc + '</span></div>' : '') +
        '<div class="stat-entry-row bench"><span class="label">Benchmarks</span><span class="body">' + g.bench + '</span></div>' +
        (g.pitfall ? '<div class="stat-entry-row pitfall"><span class="label">Common pitfall</span><span class="body">' + g.pitfall + '</span></div>' : '') +
      '</div>'
    ).join('');

  const pitchesHTML =
    '<div class="school-intro">Every pitcher’s arsenal is built from these shapes. <strong>Velocity</strong> is the radar gun number. <strong>Movement</strong> is what the ball does. <strong>Purpose</strong> is what the pitch is trying to accomplish.</div>' +
    PITCH_TYPES.map(cat =>
      '<div class="pitch-category"><div class="pitch-category-title">' + cat.category + '</div>' +
      cat.pitches.map(p =>
        '<div class="pitch-card"><div class="pitch-card-head"><div><span class="pitch-name">' + p.name + '</span><span class="pitch-abbr" style="margin-left:8px">' + p.abbr + '</span></div><div class="pitch-velo">' + p.velo + '</div></div>' +
        '<div class="pitch-row"><span class="label">Movement</span><span class="body">' + p.movement + '</span></div>' +
        '<div class="pitch-row"><span class="label">Purpose</span><span class="body">' + p.purpose + '</span></div>' +
        '<div class="pitch-row"><span class="label">Watch for</span><span class="body">' + p.watch + '</span></div>' +
        '</div>'
      ).join('') +
      '</div>'
    ).join('');

  const diamond = [
    { num: 1, x: 50, y: 60, type: 'battery' },
    { num: 2, x: 50, y: 84, type: 'battery' },
    { num: 3, x: 75, y: 50, type: '' },
    { num: 4, x: 64, y: 38, type: '' },
    { num: 5, x: 25, y: 50, type: '' },
    { num: 6, x: 36, y: 38, type: '' },
    { num: 7, x: 18, y: 18, type: 'outfield' },
    { num: 8, x: 50, y: 12, type: 'outfield' },
    { num: 9, x: 82, y: 18, type: 'outfield' }
  ];

  const positionsHTML =
    '<div class="school-intro">The position numbering is how every box score, scorecard, and Statcast database identifies fielders. ' + POSITIONS.notes + '</div>' +
    '<div class="card" style="margin-bottom:20px;"><h2>The diamond</h2><div class="diamond-wrap"><div class="diamond">' +
      '<div class="outfield-arc"></div><div class="diamond-shape"></div>' +
      diamond.map(d => '<div class="diamond-pos ' + d.type + '" style="left:' + d.x + '%; top:' + d.y + '%;" title="' + d.num + '">' + d.num + '</div>').join('') +
    '</div></div><div style="font-size:12px; color:#8b96a8; text-align:center; margin-top:8px;">Battery (yellow): pitcher / catcher · Infield (blue): 1B–SS · Outfield (light blue): LF–RF</div></div>' +
    '<h2>Position numbers</h2><div class="position-grid">' +
    POSITIONS.fielders.map(f =>
      '<div class="position-card"><div class="position-num">' + f.num + '</div><div class="position-body">' +
      '<div class="position-head"><span class="position-name">' + f.name + '</span><span class="position-abbr">' + f.abbr + '</span></div>' +
      '<div class="position-note">' + f.note + '</div></div></div>'
    ).join('') + '</div>' +
    '<h2 style="margin-top:24px;">Scoring codes</h2><div class="score-codes">' +
      POSITIONS.scoringCodes.map(c => '<div class="code">' + c.code + '</div><div class="meaning">' + c.meaning + '</div>').join('') +
    '</div>';

  const watchHTML =
    '<div class="school-intro">The stuff a sharp viewer notices that the broadcast doesn’t always spell out.</div>' +
    WATCHING.map(theme =>
      '<div class="theme-block"><div class="theme-block-title">' + theme.theme + '</div>' +
      theme.tips.map(tip => '<div class="tip"><div class="tip-headline">' + tip.headline + '</div><div class="tip-body">' + tip.body + '</div></div>').join('') +
      '</div>'
    ).join('');

  document.getElementById('panel-school').innerHTML =
    '<div class="school-tab-switch">' +
      '<button class="active" data-school="stats">Stats Reference</button>' +
      '<button data-school="pitches">Pitch Types</button>' +
      '<button data-school="positions">Positions &amp; Scoring</button>' +
      '<button data-school="watch">How to Watch</button>' +
    '</div>' +
    '<div class="school-content active" id="school-stats">' + statsHTML + '</div>' +
    '<div class="school-content" id="school-pitches">' + pitchesHTML + '</div>' +
    '<div class="school-content" id="school-positions">' + positionsHTML + '</div>' +
    '<div class="school-content" id="school-watch">' + watchHTML + '</div>';

  document.querySelectorAll('#panel-school .school-tab-switch button').forEach(btn => {
    btn.addEventListener('click', () => switchSchool(btn.dataset.school));
  });
}

function switchSchool(which) {
  document.querySelectorAll('.school-tab-switch button').forEach(b => b.classList.toggle('active', b.dataset.school === which));
  document.querySelectorAll('.school-content').forEach(c => c.classList.toggle('active', c.id === 'school-' + which));
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function escapeText(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── Init ─────────────────────────────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadAll);
} else {
  loadAll();
}
</script>
</body>
</html>
