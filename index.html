  glossary: [
    { term: 'wRC+', name: 'Weighted Runs Created Plus',
      def: 'Park- and league-adjusted total offensive value. The single best one-number summary of a hitter.',
      calc: 'Built on wOBA (Weighted On-Base Average), which assigns linear-weights values to each offensive event (1B, 2B, 3B, HR, BB, HBP). wOBA is converted to runs above average per plate appearance, adjusted for park and league, and scaled so 100 = league average. Every point above or below is 1% better or worse.',
      bench: '160+ MVP-tier · 140 All-Star · 120 above average · 100 league average · 90 below · 80 replacement · 70 unplayable.',
      pitfall: 'Sample-size matters. A 150 wRC+ over 100 PA is mostly noise; over 400+ PA it’s real. A season-to-date number after a hot first month flatters a player whose underlying contact has cooled.' },
    { term: 'OPS+', name: 'On-Base Plus Slugging Plus',
      def: 'Older equivalent of wRC+. Park-adjusted OPS scaled so 100 is league average. Same intuition, different inputs.',
      calc: '100 × ((OBP / lgOBP) + (SLG / lgSLG) − 1), then park-adjusted.',
      bench: 'Same scale as wRC+. Slightly less precise (treats OBP and SLG as additive components rather than weighting events directly).',
      pitfall: 'When OPS+ and wRC+ diverge meaningfully, trust wRC+. The linear-weights basis is sounder.' },
    { term: 'OPS', name: 'On-Base Plus Slugging',
      def: 'On-base percentage plus slugging. Quick and dirty offensive snapshot.',
      calc: 'OBP + SLG. That’s it.',
      bench: '1.000+ historic · .900+ great · .800+ above average · .700 league average · .600 weak · .500 unplayable.',
      pitfall: 'Not park- or era-adjusted. A .800 OPS in Coors Field is meaningfully worse than .800 in Oakland. Treats OBP and SLG as equally weighted, but OBP is roughly 1.7× as valuable per point of run production.' },
    { term: 'xwOBA', name: 'Expected Weighted On-Base Average',
      def: 'What a hitter "should" produce based on the quality of their batted balls plus their walks and strikeouts.',
      calc: 'Statcast assigns an expected outcome (hit, out, etc.) to every batted ball based on its exit velocity and launch angle, computed from the historical league outcomes for similar contact. Combines those expected outcomes with actual walks and strikeouts into a wOBA-scaled number.',
      bench: '.400+ elite · .370+ great · .340+ above average · .320 average · .300 weak.',
      pitfall: 'Doesn’t account for spray direction, defensive positioning, or shift adjustments. A pull-heavy slow-runner can underperform xwOBA by 20+ points sustainably. Compare xwOBA to actual wOBA — gap suggests luck or skill on contact placement.' },
    { term: 'Barrel%', name: 'Barrel Rate',
      def: 'Percent of batted balls hit at the optimal exit velo + launch angle combination — historically those produce ≥.500 BA and ≥1.500 SLG.',
      calc: 'A "barrel" requires 98+ MPH exit velocity at a launch angle between roughly 26° and 30° (the range expands as exit velo climbs above 100 MPH). Barrels / batted ball events.',
      bench: '15%+ elite (top decile) · 10%+ above average · 6-8% average · <5% weak.',
      pitfall: 'A high barrel rate with a low batting average means a hitter is hitting it hard but also into shifts or to deep parts of the park (or just unlucky on placement). Doesn’t capture line-drive contact that goes for hits but isn’t a barrel.' },
    { term: 'Hard Hit%', name: 'Hard Hit Rate',
      def: 'Percent of batted balls hit 95+ MPH off the bat.',
      calc: 'Batted balls ≥95 MPH exit velocity / total batted balls. No launch-angle component.',
      bench: '50%+ elite · 45%+ above average · 40% average · 35% weak.',
      pitfall: 'Hard contact at the wrong angle is a ground-ball out. Pair with launch angle and barrel% for the full picture.' },
    { term: 'FIP', name: 'Fielding Independent Pitching',
      def: 'What a pitcher’s ERA "should" be based on outcomes they control: walks, strikeouts, hit-by-pitches, and home runs. Strips out defense and BABIP luck.',
      calc: '((13×HR + 3×(BB+HBP) − 2×K) / IP) + a constant (~3.10) that anchors league FIP to league ERA. The constant changes year-to-year.',
      bench: '2.50 ace · 3.00 elite · 3.50 great · 4.00 league average · 4.50+ below.',
      pitfall: 'Treats all home runs equally regardless of context (solo vs. grand slam). Doesn’t capture pitch-to-contact specialists who induce weak contact intentionally — those guys may sustain ERA below FIP year over year.' },
    { term: 'xFIP', name: 'Expected FIP',
      def: 'FIP with the home run rate normalized to the league average HR/FB ratio. Predicts future ERA better than current FIP.',
      calc: 'Same as FIP, but instead of using actual HRs allowed, uses (fly balls × league HR/FB rate).',
      bench: 'Same scale as FIP.',
      pitfall: 'Some pitchers genuinely suppress (or surrender) HRs at sustainable rates outside the league norm — extreme groundballers, or pitchers whose home parks distort fly-ball outcomes. xFIP regresses both groups toward the mean, which can be wrong.' },
    { term: 'WHIP', name: 'Walks + Hits per Inning Pitched',
      def: 'Baserunners (excluding HBP and errors) allowed per inning.',
      calc: '(BB + H) / IP.',
      bench: '0.90 historic · 1.00 elite · 1.10 great · 1.20 above average · 1.30 average · 1.40+ rough.',
      pitfall: 'Counts hits as much as walks even though hits are mostly outside pitcher control (BABIP). A high-strikeout pitcher with mediocre WHIP often has a better FIP than the WHIP suggests.' },
    { term: 'K/9, BB/9', name: 'Strikeouts and Walks per 9 IP',
      def: 'Rate stats per nine-inning frame. Together they’re the simplest read on a pitcher’s stuff and command.',
      calc: '(K × 9) / IP. Same for BB.',
      bench: 'K/9: 12+ elite · 10+ great · 8 average · 6 weak. BB/9: 1.5 elite · 2.5 great · 3.0 average · 4.0+ rough.',
      pitfall: 'Per-9 rates can be inflated by short outings or relief work (relievers tend to higher K/9). For starters, K% (strikeouts as % of batters faced) is a cleaner comparison.' },
    { term: 'fWAR', name: 'FanGraphs Wins Above Replacement',
      def: 'Total estimated value above a freely-available replacement player, expressed in wins.',
      calc: 'For position players: (Batting + Baserunning + Fielding + Positional Adjustment + Replacement) / Runs-per-Win. For pitchers: built on FIP, scaled by innings, with leverage and park adjustments. The "freely available" baseline is roughly a Triple-A call-up.',
      bench: '8+ MVP/Cy Young season · 5+ All-Star · 3-4 solid regular · 2 league-average regular · 0-1 bench/replacement · negative = team would be better with anyone else.',
      pitfall: 'fWAR (FanGraphs, FIP-based for pitchers) and bWAR (Baseball-Reference, RA-based for pitchers) often disagree by 1-2 wins. They’re different opinions, not different facts. Defensive components are noisier than offensive ones — a 2 WAR season with a -10 DRS swing could really be 1 or 3.' },
    { term: 'DRS', name: 'Defensive Runs Saved',
      def: 'Runs saved (or surrendered) vs. an average defender at the position. Baseball Info Solutions’ metric, video-scouting based.',
      calc: 'BIS scouts every batted ball, classifies it by zone and difficulty, and credits/debits the fielder vs. the average outcome on plays of that difficulty. Includes positioning, range, throwing arm, double-play conversion, and outfield error rates.',
      bench: '+15 elite season · +10 great · +5 plus · 0 average · -5 below · -10 bad · -15 disastrous.',
      pitfall: 'Year-over-year correlation is weaker than offensive metrics — defense looks noisier in 1-year samples. Outfield DRS in particular swings on a few key plays. Use 2-3 year averages for skill assessment.' },
    { term: 'OAA', name: 'Outs Above Average',
      def: 'Statcast tracking-based defensive metric. Plays made vs. expected, based on difficulty.',
      calc: 'Statcast tracks every fielder’s position at pitch release, the batted ball’s trajectory and speed, and computes the league-average catch probability for that play. The fielder gets credit (or debit) equal to (1 − catch probability) for outs made and (-catch probability) for plays missed.',
      bench: '+15 elite · +10 great · +5 plus · 0 average · -5 below.',
      pitfall: 'Doesn’t fully capture throwing arm, double plays, or first-baseman scoops the way DRS does. For middle infielders, the two metrics usually agree; for OF and 1B they can diverge.' },
    { term: 'WPA', name: 'Win Probability Added',
      def: 'How much each play swings the game’s win probability. Sums to the team’s eventual win or loss.',
      calc: 'Win Expectancy is computed for every base/out/score/inning state from historical data. Each play’s WPA = post-play WE − pre-play WE for the batting team. A walk-off grand slam in a tied bottom-9 might be +0.50 WPA.',
      bench: 'Single biggest play in a typical game: 0.15-0.30 WPA. Walk-off in a one-run game: 0.40-0.50. Season WPA leaders: 4-5+ for top hitters.',
      pitfall: 'Heavily context-dependent — the same home run is worth more in a tie game than a blowout. Useful for "biggest moment" callouts; not a clean talent metric.' },
    { term: 'Pythagorean', name: 'Pythagorean Win-Loss',
      def: 'Bill James formula estimating what a team’s record "should" be based on runs scored vs. allowed.',
      calc: 'Win % ≈ RS² / (RS² + RA²). Refined versions use exponents around 1.83 instead of 2 (the "Pythagenpat" tweak).',
      bench: 'A team beating Pythag by 3+ wins over a season is "lucky" — usually unsustainable. Trailing by 3+ wins is "unlucky" and tends to regress.',
      pitfall: 'Bullpen quality and one-run-game performance can sustainably beat Pythag (good closers convert close leads into wins). Doesn’t capture clutch hitting or sequencing — but most teams that look "clutch" early regress over a full year.' }
  ],

function statChip(stat, displayValue) {
  const def = STAT_DEFS[stat];
  if (!def) return displayValue || stat;
  const id = 'sc_' + Math.random().toString(36).slice(2, 9);
  return `<span class="stat-chip" onclick="toggleTip('${id}')">${displayValue || stat}<span class="tooltip" id="${id}"><span class="tooltip-stat">${stat} — ${def.name}</span><span class="tooltip-section">What it measures</span><span class="tooltip-body">${def.measures}</span><span class="tooltip-section">Benchmarks</span><span class="tooltip-body">${def.bench}</span></span></span>`;
}

function toggleTip(id) {
  document.querySelectorAll('.tooltip.open').forEach(t => { if (t.id !== id) t.classList.remove('open'); });
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
  event.stopPropagation();
}

document.body.addEventListener('click', () => {
  document.querySelectorAll('.tooltip.open').forEach(t => t.classList.remove('open'));
});

function renderHeader() {

  if (refreshed && DATA.lastRefreshed) refreshed.textContent = `Last refreshed: ${DATA.lastRefreshed}`;
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t =>
    `<button class="nav-btn ${t.id === 'overview' ? 'active' : ''}" data-tab="${t.id}">${ICONS[t.icon]}<span>${t.label}</span></button>`
  ).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tabId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
  if (tabId === 'overview' && !window._chartDrawn) drawDiffChart();
}

      <p><strong>The Cease IL placement is the load-bearing news of the week.</strong> Schneider used the phrase "pretty positive" about the MRI and Cease told him he wants the ball for his next turn, but the team isn\'t risking a hamstring grab two weeks before Bieber and Scherzer come back. "Hoping it\'s a minimal stay," Schneider said. Best case is Cease returns for the Memorial Day weekend series; worst case is a setback that turns a 15-day stint into something longer. Corbin slots in for at least one turn — his 5/23 outing over Skenes (6 IP / 1 ER / 7 K / 0 BB) is the receipt that the rotation can absorb one Cease miss. Two would be tougher. The corresponding move was selecting Tanner Andrews — 30, MiLB free-agent signing, 1.35 ERA in 20 Triple-A IP — who retired the Marlins 1-2-3 in his MLB debut 9th. Watch his next outing in a tighter spot.</p>

function drawDiffChart() {
  if (window._chartDrawn) return;
  const ctx = document.getElementById('diffChart');
  if (!ctx) return;
  const data = DATA.recentRunDiff;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: 'Run Diff',
        data: data.map(d => d.diff),
        backgroundColor: data.map(d => d.diff >= 0 ? 'rgba(63,185,80,0.7)' : 'rgba(248,81,73,0.7)'),
        borderColor: data.map(d => d.diff >= 0 ? '#3fb950' : '#f85149'),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d141f', borderColor: '#2a3548', borderWidth: 1,
          callbacks: { label: (item) => { const d = data[item.dataIndex]; return `${d.result} · run diff ${d.diff > 0 ? '+' : ''}${d.diff}`; } }
        }
      },
      scales: {
        x: { ticks: { color: '#8b96a8' }, grid: { color: '#1f2937' } },
        y: { ticks: { color: '#8b96a8' }, grid: { color: '#1f2937' } }
      }
    }
  });
  window._chartDrawn = true;
}

const ALL_PLAYERS = [...DATA.players.lineup, ...DATA.players.rotation, ...DATA.players.bullpen, ...DATA.players.bench];

function openPlayer(id) {
  const p = ALL_PLAYERS.find(x => x.id === id);
  if (!p) return;

  const rows = Object.entries(p.full).map(([label, val]) => {
    const notes = p.contextNotes || {};
    const ctx = notes[label] || notes[label.split(' ')[0]] || notes[label.split(' / ')[0]];
    const chipLabel = STAT_DEFS[label] ? statChip(label) : label;
    return `
      <div class="stat-row">
        <div class="stat-row-label">${chipLabel}</div>
        <div class="stat-row-val">${val}</div>
        ${ctx ? `<div class="stat-row-context">${ctx}</div>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-head">
      <div class="modal-title">${p.name}</div>
      <div class="modal-sub">${p.pos}${p.bats ? ' · Bats ' + p.bats : ''}${p.recentNote ? ' · ' + p.recentNote : ''}</div>
    </div>
    <div>${rows}</div>
    ${p.read ? `<div class="read"><div class="read-label">The read</div>${p.read}</div>` : ''}
    <div class="ask-box">
      <div class="section-title">Ask the analyst</div>
      <div class="ask-input">
        <input type="text" id="askInput" placeholder="Ask about ${p.name.split(' ')[0]}'s game..." onkeydown="if(event.key==='Enter')askAboutPlayer('${p.id}')">
        <button onclick="askAboutPlayer('${p.id}')" id="askBtn">Ask</button>
      </div>
      <div class="ask-suggestions">
        <button class="ask-chip" onclick="askWithText('What does the underlying data say about whether ${p.name}\'s recent stretch is real?', '${p.id}')">Is the recent stretch real?</button>
        <button class="ask-chip" onclick="askWithText('How does ${p.name}\'s 2026 line compare to their 2025?', '${p.id}')">vs. last year</button>
        <button class="ask-chip" onclick="askWithText('What\'s the role-specific bar ${p.name} needs to clear?', '${p.id}')">Role bar</button>
      </div>
      <div class="ask-output" id="askOutput"></div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function askWithText(text, pid) {
  document.getElementById('askInput').value = text;
  askAboutPlayer(pid);
}

async function askAboutPlayer(pid) {
  const input = document.getElementById('askInput');
  const btn = document.getElementById('askBtn');
  const out = document.getElementById('askOutput');
  const q = input.value.trim();
  if (!q) return;
  const p = ALL_PLAYERS.find(x => x.id === pid);
  if (!p) return;

  btn.disabled = true; btn.textContent = 'Thinking...';
  out.classList.add('shown'); out.textContent = 'Thinking...';

  const prompt = `You are a sharp baseball analyst writing a Blue Jays brief in the voice of a smart friend who watches a lot of games. Tone: confident but not preachy, no broadcaster cliche, willing to say something is uncertain. Cite numbers naturally as part of the read, not as definitions.

Current question about ${p.name} (${p.pos}): "${q}"

Player snapshot (May 26, 2026):
${JSON.stringify(p.full, null, 2)}

Existing read on this player:
${p.read || ''}

Recent note: ${p.recentNote || 'none'}

Write a 2-4 sentence response in that voice. Be direct. If the data doesn\'t support a confident answer, say so.`;

  try {
    if (window.cowork && window.cowork.askClaude) {
      const result = await window.cowork.askClaude(prompt, []);
      out.textContent = typeof result === 'string' ? result : (result.text || JSON.stringify(result));
    } else {
      out.textContent = 'Ask-Claude is not available in this environment. (window.cowork.askClaude not present.)';
    }
  } catch (e) {
    out.textContent = 'Error: ' + (e.message || String(e));
  } finally {
    btn.disabled = false; btn.textContent = 'Ask';
  }
}

    <div class="section">

        `).join('')}

    `).join('')}
  `;

  const diamond = [
    { num: 1, x: 50, y: 60, type: 'battery', label: 'P' },
    { num: 2, x: 50, y: 84, type: 'battery', label: 'C' },
    { num: 3, x: 75, y: 50, type: '',        label: '1B' },
    { num: 4, x: 64, y: 38, type: '',        label: '2B' },
    { num: 5, x: 25, y: 50, type: '',        label: '3B' },
    { num: 6, x: 36, y: 38, type: '',        label: 'SS' },
    { num: 7, x: 18, y: 18, type: 'outfield',label: 'LF' },

  const positionsHTML = `
    <div class="school-intro">
      The position numbering is how every box score, scorecard, and Statcast database identifies fielders. ${DATA.positions.notes}
    </div>
    <div class="card" style="margin-bottom:20px;">

  const watchHTML = `
    <div class="school-intro">

}

function switchSchool(which) {
  document.querySelectorAll('.school-tab-switch button').forEach(b => b.classList.toggle('active', b.dataset.school === which));
  document.querySelectorAll('.school-content').forEach(c => c.classList.toggle('active', c.id === 'school-' + which));
}

async function askAboutGame(i) {
  const g = DATA.recentGames[i];
  const input = document.getElementById('askGame' + i);
  const btn = document.getElementById('askGameBtn' + i);
  const out = document.getElementById('askGameOut' + i);
  const q = input.value.trim();
  if (!q) return;
  btn.disabled = true; btn.textContent = '...';
  out.classList.add('shown'); out.textContent = 'Thinking...';

  const prompt = `You are a sharp baseball analyst writing a Blue Jays brief in the voice of a smart friend who watches a lot of games. Tone: confident but not preachy, willing to say something is uncertain.

Game: ${g.date} ${g.home ? 'vs' : '@'} ${g.opp}, result ${g.result} ${g.score}.
Signature moment: ${g.moment}
What it meant (existing read): ${g.meaning}

Question: "${q}"

Write a 2-3 sentence response in that voice. Be direct. If the data doesn\'t support a confident answer, say so.`;

  try {
    if (window.cowork && window.cowork.askClaude) {
      const result = await window.cowork.askClaude(prompt, []);
      out.textContent = typeof result === 'string' ? result : (result.text || JSON.stringify(result));
    } else {
      out.textContent = 'Ask-Claude is not available in this environment.';
    }
  } catch (e) {
    out.textContent = 'Error: ' + (e.message || String(e));
  } finally {
    btn.disabled = false; btn.textContent = 'Ask';
  }
}
