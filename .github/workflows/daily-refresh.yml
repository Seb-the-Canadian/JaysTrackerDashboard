name: Daily data refresh

# Runs fetch_data.py once a day and commits the resulting data.json to main
# if it changed. Replaces the Claude Code Routine for the daily refresh
# (Actions runners have unrestricted internet, so no statsapi.mlb.com
# allowlist friction).
#
# Disable the Claude Code Routine before merging this, or both will commit
# every day and you'll get duplicate "Daily data refresh" entries.

on:
  schedule:
    # 09:00 UTC daily. That's 05:00 EDT / 04:00 EST in Toronto.
    # Cron is always UTC; if you want a fixed *local* hour year-round,
    # you'll need to manually adjust this twice a year for DST. Picking
    # a UTC time and accepting the 1-hour shift in winter is the simpler
    # default.
    #
    # GitHub Actions cron is best-effort: under load, scheduled jobs can
    # be delayed by 5-30 minutes. That's fine for once-a-day data.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch data
        env:
          # Only consumed when config.news_summarize=true with the anthropic
          # provider (issue #53). Safe-no-op otherwise; the secret can be
          # absent on forks that haven't opted in.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push if changed
        run: |
          # data/gamelog_cache.json is the per-player gameLog cache (#52).
          # data/tldr_cache.json is the news TL;DR cache (#53, optional).
          # We check all three so any one of them changing triggers a commit.
          if [[ -z "$(git status --porcelain data.json data/gamelog_cache.json data/tldr_cache.json)" ]]; then
            echo "no changes"
            exit 0
          fi
          git config user.name "jays-tracker-bot"
          git config user.email "bot@example.invalid"
          git add data.json data/gamelog_cache.json
          # Only add tldr_cache if it exists (most forks won't enable summarize).
          [ -f data/tldr_cache.json ] && git add data/tldr_cache.json
          git commit -m "Daily data refresh: $(date -u +%Y-%m-%d)"

          # If main moved between checkout and push (concurrent PR merge,
          # manual commit, an overlapping workflow run), the first push
          # gets rejected as non-fast-forward. Rebase onto the new tip
          # and try again — the daily refresh commit only touches
          # data.json, so a rebase against anything else won't conflict.
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed daily refresh (attempt $attempt)"
              exit 0
            fi
            echo "push rejected on attempt $attempt, rebasing onto origin/main..."
            git pull --rebase origin main
          done
          echo "ERROR: push still failing after 3 rebase-and-retry attempts"
          exit 1
